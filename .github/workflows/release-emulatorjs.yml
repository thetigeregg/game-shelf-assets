name: Release EmulatorJS

on:
  workflow_dispatch:
    inputs:
      emulatorjsVersion:
        description: "Pinned EmulatorJS version"
        required: true
        type: string
      sourceUrl:
        description: "Source archive URL"
        required: true
        type: string
      dryRun:
        description: "Skip publish step"
        required: true
        default: true
        type: boolean

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: |
          node scripts/release-emulatorjs.mjs \
            --artifact emulatorjs \
            --version "${{ inputs.emulatorjsVersion }}" \
            --sourceUrl "${{ inputs.sourceUrl }}" \
            --dryRun "${{ inputs.dryRun }}" \
            --pagesOutDir ".pages-dist"
      - name: Configure GitHub Pages
        if: ${{ inputs.dryRun == false }}
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        if: ${{ inputs.dryRun == false }}
        uses: actions/upload-pages-artifact@v4
        with:
          path: .pages-dist
      - name: Open automated PR
        if: ${{ inputs.dryRun == false }}
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/release-emulatorjs-${{ inputs.emulatorjsVersion }}
          title: "release(emulatorjs): ${{ inputs.emulatorjsVersion }}"
          commit-message: "release(emulatorjs): publish ${{ inputs.emulatorjsVersion }}"
          body: |
            ## Summary
            - fetched pinned EmulatorJS artifacts
            - generated immutable manifest with SRI
            - verified artifact integrity before publish
  deploy:
    if: ${{ inputs.dryRun == false }}
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
